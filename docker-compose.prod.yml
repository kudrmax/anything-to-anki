# Production override. Always combine with the base compose file:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml ...
#
# Hardcodes APP_ENV=production for both app and worker so a forgotten
# shell env var can never load the wrong DB. Use via `make prod-up`.

services:
  app:
    environment:
      APP_ENV: production
  worker:
    environment:
      APP_ENV: production
