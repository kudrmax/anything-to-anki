services:
  app:
    build:
      context: .
      args:
        VITE_APP_ENV: ${APP_ENV:-development}
    ports:
      - "${PORT:-17832}:8000"
    environment:
      APP_ENV: ${APP_ENV:-development}
      ANKI_URL: http://host.docker.internal:8765
      AI_PROXY_URL: ${AI_PROXY_URL:-http://host.docker.internal:8766}
      REDIS_URL: redis://redis:6379
      PROMPTS_CONFIG_PATH: /app/config/prompts.yaml
    volumes:
      - ./data:/data
      - ./config:/app/config:ro
    depends_on:
      - redis

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      APP_ENV: ${APP_ENV:-development}
      AI_PROXY_URL: ${AI_PROXY_URL:-http://host.docker.internal:8766}
      REDIS_URL: redis://redis:6379
      PROMPTS_CONFIG_PATH: /app/config/prompts.yaml
    volumes:
      - ./data:/data
      - ./config:/app/config:ro
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    volumes:
      - ./data/redis:/data
