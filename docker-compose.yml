services:
  app:
    build:
      context: .
      args:
        VITE_INSTANCE_ENV_NAME: ${INSTANCE_ENV_NAME}
    ports:
      - "${PORT}:8000"
    environment:
      ANKI_URL: http://host.docker.internal:8765
      AI_PROXY_URL: http://host.docker.internal:${AI_PROXY_PORT}
      PROMPTS_CONFIG_PATH: /app/config/prompts.yaml
      DICTIONARIES_DIR: /app/dictionaries
      LOCAL_VIDEO_DIR: /local-videos
    volumes:
      - ./data:/data
      - ./config:/app/config:ro
      - ${DICTIONARIES_DIR}:/app/dictionaries:ro
      - ./anki-templates:/app/anki-templates:ro
      - ./scripts:/app/scripts:ro
      - ${LOCAL_VIDEO_DIR:-/dev/null}:/local-videos:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/settings"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 15s

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      AI_PROXY_URL: http://host.docker.internal:${AI_PROXY_PORT}
      PROMPTS_CONFIG_PATH: /app/config/prompts.yaml
      DICTIONARIES_DIR: /app/dictionaries
      LOCAL_VIDEO_DIR: /local-videos
    volumes:
      - ./data:/data
      - ./config:/app/config:ro
      - ${DICTIONARIES_DIR}:/app/dictionaries:ro
      - ./anki-templates:/app/anki-templates:ro
      - ${LOCAL_VIDEO_DIR:-/dev/null}:/local-videos:ro
