services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8080:8000"
    volumes:
      - ./vocabminer.db:/app/vocabminer.db

  web:
    build:
      context: ./frontends/web
      args:
        VITE_API_URL: http://localhost:8080
    ports:
      - "80:80"
    depends_on:
      - api
